<div class="auth-container">
  <div class="auth-card">
    <h2>💰 Expense Tracker</h2>
    <h3>Create Account</h3>

    <form (ngSubmit)="onRegister()" autocomplete="on">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="fullName" [(ngModel)]="fullName" placeholder="Enter your full name" autocomplete="name" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your email" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="Create a password" autocomplete="new-password" />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="link">Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</div>
