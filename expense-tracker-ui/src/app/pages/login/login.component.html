<div class="auth-container">
  <div class="auth-card">
    <h2>💰 Expense Tracker</h2>
    <h3>Sign In</h3>

    <form (ngSubmit)="onLogin()" autocomplete="on">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your email" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="link">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
